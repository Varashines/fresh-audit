version: "3.8"

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: freshaudit_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-varaprasad_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecretAuditPassword2026}
      POSTGRES_DB: ${POSTGRES_DB:-freshaudit_master}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-varaprasad_admin}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: freshaudit_backend
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-varaprasad_admin}:${POSTGRES_PASSWORD:-SecretAuditPassword2026}@postgres_db:5432/${POSTGRES_DB:-freshaudit_master}
      JWT_SECRET: ${JWT_SECRET:-freshaudit-change-this-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}
    depends_on:
      postgres_db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
